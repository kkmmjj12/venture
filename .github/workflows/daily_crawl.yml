name: Venture Daily Crawl

on:
  schedule:
    - cron: "0 0 * * *"   # 매일 UTC 00:00 = KST 09:00
  workflow_dispatch:        # 수동 실행

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore DB cache (중복 방지용)
        uses: actions/cache@v4
        with:
          path: competitions.db
          key: competitions-db-${{ github.run_id }}
          restore-keys: |
            competitions-db-

      - name: Run crawler
        run: python -c "from backend.crawler_runner import run_all_crawlers; run_all_crawlers()"

      - name: Export to JSON (GitHub Pages용)
        run: python export_json.py

      - name: Deploy to GitHub Pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data.json
          git diff --staged --quiet || git commit -m "chore: update contest data [skip ci]"
          git push
