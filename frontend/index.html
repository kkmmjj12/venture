<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>venture — IT 공모전 큐레이션</title>
  <meta name="description" content="AI, 빅데이터, 앱개발 등 국내 IT 공모전을 한 곳에서! 링커리어, 위비티, 씽굿에서 실시간 수집." />
  <link rel="stylesheet" href="/static/css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
</head>
<body>

<!-- ── HEADER ── -->
<header class="header">
  <div class="header-inner">
    <a href="/" class="logo">venture</a>
    <div class="header-right">
      <div class="search-wrap">
        <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
        </svg>
        <input type="text" id="searchInput" placeholder="공모전 검색..." />
      </div>
      <button class="btn-refresh" onclick="refreshData()">🔄 갱신</button>
    </div>
  </div>
</header>

<!-- ── HERO ── -->
<section class="hero">
  <h1>지금 지원할 수 있는<br /><em>IT 공모전</em>을 한 눈에</h1>
  <p>링커리어 · 씽굿 · 위비티 · 공모전박람회 · 캠퍼스픽 데이터를 실시간으로 큐레이션합니다.</p>
  <div class="hero-stats">
    <div class="stat"><div class="stat-num" id="statTotal">—</div><div class="stat-label">전체 공모전</div></div>
    <div class="stat"><div class="stat-num" id="statClosing">—</div><div class="stat-label">D-7 이내 마감</div></div>
    <div class="stat"><div class="stat-num" id="statSites">5</div><div class="stat-label">수집 사이트</div></div>
  </div>
</section>

<!-- ── CATEGORY BAR ── -->
<div class="cat-bar" id="catBar">
  <!-- JS로 동적 생성 -->
</div>

<!-- ── SOURCE CHIPS ── -->
<div class="source-row" id="sourceRow">
  <!-- JS로 동적 생성 -->
</div>

<!-- ── TOOLBAR ── -->
<div class="toolbar">
  <p class="result-count">총 <strong id="resultCount">—</strong>개의 공모전</p>
  <div class="sort-group">
    <button class="sort-btn active" data-sort="latest" onclick="setSort('latest', this)">최신순</button>
    <button class="sort-btn" data-sort="deadline" onclick="setSort('deadline', this)">종료임박순</button>
  </div>
</div>

<!-- ── LIST ── -->
<div class="list-wrap" id="listWrap">
  <div class="loading">
    <div class="spinner"></div>
    <p>공모전 정보를 불러오는 중...</p>
  </div>
</div>

<!-- ── FOOTER ── -->
<footer class="footer">
  <div class="footer-logo">venture</div>
  <p>데이터 출처:
    <a href="https://linkareer.com/list/contest" target="_blank">링커리어</a> ·
    <a href="https://www.wevity.com" target="_blank">위비티</a> ·
    <a href="https://www.thinkgood.co.kr" target="_blank">씽굿</a> ·
    <a href="https://www.contestkorea.com" target="_blank">공모전박람회</a>
  </p>
  <p>정보는 참고용이며 실제 공고를 반드시 확인하세요.</p>
</footer>

<div id="toast"></div>

<script src="/static/js/app.js"></script>
</body>
</html>
