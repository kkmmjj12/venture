<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>venture — IT 공모전 큐레이션</title>
  <meta name="description" content="AI, 빅데이터, 앱개발 등 국내 IT 공모전을 한 곳에서! 링커리어, 위비티, 씽굿에서 실시간 수집." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #0f1117;
      --surface: #1a1d27;
      --sur2:    #22263a;
      --border:  #2e3247;
      --accent:  #6c63ff;
      --accent2: #a78bfa;
      --text:    #e8eaf0;
      --sub:     #8b92b3;
      --green:   #22c55e;
      --yellow:  #f59e0b;
      --red:     #ef4444;
      --r:       12px;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans KR', -apple-system, sans-serif;
      min-height: 100vh;
    }
    a { text-decoration: none; color: inherit; }

    /* ── HEADER ── */
    header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(15,17,23,.88);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 32px; height: 64px;
    }
    .h-inner {
      height: 100%; max-width: 1100px; margin: 0 auto;
      display: flex; align-items: center; justify-content: space-between;
    }
    .logo {
      font-size: 1.55rem; font-weight: 800; letter-spacing: -1px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .search-wrap {
      display: flex; align-items: center; gap: 8px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; padding: 7px 14px; width: 220px;
      transition: border-color .2s;
    }
    .search-wrap:focus-within { border-color: var(--accent); }
    .search-wrap svg { opacity: .4; flex-shrink: 0; }
    .search-wrap input {
      background: none; border: none; outline: none;
      color: var(--text); font-size: .85rem; width: 100%; font-family: inherit;
    }
    .search-wrap input::placeholder { color: var(--sub); }

    /* ── HERO ── */
    .hero {
      padding: 60px 32px 44px; text-align: center;
      background: radial-gradient(ellipse 80% 50% at 50% -10%, rgba(108,99,255,.18) 0%, transparent 70%);
      max-width: 1100px; margin: 0 auto;
    }
    .hero h1 { font-size: 2.4rem; font-weight: 800; letter-spacing: -1.5px; line-height: 1.22; }
    .hero h1 em {
      font-style: normal;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .hero p { margin-top: 12px; color: var(--sub); font-size: .92rem; }
    .hero-stats { display: flex; justify-content: center; gap: 36px; margin-top: 28px; }
    .stat { text-align: center; }
    .stat-num { font-size: 1.7rem; font-weight: 800; color: var(--accent2); }
    .stat-label { font-size: .72rem; color: var(--sub); margin-top: 2px; }

    /* ── CAT BAR ── */
    .cat-bar {
      display: flex; gap: 8px; padding: 0 32px;
      overflow-x: auto; scrollbar-width: none;
      max-width: 1100px; margin: 8px auto 0;
    }
    .cat-bar::-webkit-scrollbar { display: none; }
    .cat-btn {
      flex-shrink: 0; padding: 7px 18px; border-radius: 999px;
      border: 1px solid var(--border); background: var(--surface);
      color: var(--sub); font-size: .82rem; font-weight: 600;
      cursor: pointer; transition: all .15s; font-family: inherit;
      display: flex; align-items: center; gap: 5px; white-space: nowrap;
    }
    .cat-btn .cnt {
      font-size: .7rem; background: var(--sur2);
      border-radius: 999px; padding: 1px 6px; color: var(--sub);
    }
    .cat-btn:hover { border-color: var(--accent); color: var(--accent2); }
    .cat-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .cat-btn.active .cnt { background: rgba(255,255,255,.2); color: #fff; }

    /* ── SOURCE ROW ── */
    .src-row {
      display: flex; gap: 8px; padding: 10px 32px 0;
      overflow-x: auto; scrollbar-width: none;
      max-width: 1100px; margin: 0 auto;
    }
    .src-row::-webkit-scrollbar { display: none; }
    .src-chip {
      flex-shrink: 0; padding: 5px 13px; border-radius: 8px;
      border: 1px solid var(--border); background: var(--surface);
      color: var(--sub); font-size: .78rem; font-weight: 700;
      cursor: pointer; transition: all .15s; font-family: inherit;
    }
    .src-chip:hover { border-color: var(--accent); }
    .src-chip.active { background: var(--sur2); border-color: var(--accent); color: var(--accent2); }

    /* ── TOOLBAR ── */
    .toolbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 32px 10px; max-width: 1100px; margin: 0 auto;
    }
    .result-count { font-size: .82rem; color: var(--sub); }
    .result-count strong { color: var(--text); }
    .sort-group { display: flex; gap: 4px; }
    .sort-btn {
      padding: 6px 14px; border-radius: 8px;
      border: 1px solid var(--border); background: none;
      color: var(--sub); font-size: .78rem; font-weight: 600;
      cursor: pointer; transition: all .15s; font-family: inherit;
    }
    .sort-btn:hover { color: var(--text); border-color: var(--accent); }
    .sort-btn.active { background: var(--sur2); color: var(--accent2); border-color: var(--accent); }

    /* ── LIST ── */
    .list-wrap {
      padding: 0 32px 80px; max-width: 1100px;
      margin: 0 auto; display: flex; flex-direction: column; gap: 10px;
    }

    /* ── ROW CARD ── */
    .row-card {
      display: flex; align-items: center; gap: 14px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--r); padding: 15px 20px;
      cursor: pointer; transition: border-color .15s, transform .15s, box-shadow .15s;
      text-decoration: none; color: inherit;
    }
    .row-card:hover {
      border-color: var(--accent); transform: translateY(-1px);
      box-shadow: 0 4px 24px rgba(108,99,255,.15);
    }
    .row-card.expired { opacity: .45; }

    .row-icon {
      width: 46px; height: 46px; border-radius: 10px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.35rem; overflow: hidden; background: var(--sur2);
    }
    .row-icon img { width: 100%; height: 100%; object-fit: cover; border-radius: 10px; }

    .row-main { flex: 1; min-width: 0; }
    .row-top { display: flex; align-items: center; gap: 7px; flex-wrap: wrap; }
    .row-title {
      font-size: .93rem; font-weight: 700;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 500px;
    }
    .row-cat {
      flex-shrink: 0; font-size: .68rem; font-weight: 700;
      padding: 2px 8px; border-radius: 4px;
      background: rgba(108,99,255,.15); color: var(--accent2);
    }
    .new-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
    .row-org { font-size: .77rem; color: var(--sub); margin-top: 3px; }

    .row-meta { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }

    .src-badge {
      font-size: .68rem; font-weight: 700; padding: 3px 9px;
      border-radius: 6px; letter-spacing: .2px; flex-shrink: 0;
    }
    .badge-linkareer  { background: rgba(0,102,255,.15);  color: #60a5fa; border: 1px solid rgba(0,102,255,.3); }
    .badge-wevity     { background: rgba(0,200,100,.15);  color: #4ade80; border: 1px solid rgba(0,200,100,.3); }
    .badge-thinkgood  { background: rgba(255,136,0,.15);  color: #fb923c; border: 1px solid rgba(255,136,0,.3); }
    .badge-gonmofair  { background: rgba(168,85,247,.15); color: #c084fc; border: 1px solid rgba(168,85,247,.3); }
    .badge-campuspick { background: rgba(251,191,36,.15); color: #fbbf24; border: 1px solid rgba(251,191,36,.3); }

    .deadline-wrap { text-align: right; min-width: 88px; }
    .deadline-date { font-size: .72rem; color: var(--sub); }
    .dday { font-size: .83rem; font-weight: 800; margin-top: 1px; }
    .dday-green  { color: var(--green); }
    .dday-yellow { color: var(--yellow); }
    .dday-red    { color: var(--red); }
    .dday-gray   { color: var(--sub); }

    /* ── LOADING / EMPTY ── */
    .loading, .empty {
      text-align: center; padding: 80px 0; color: var(--sub);
    }
    .loading p, .empty p { margin-top: 14px; font-size: .88rem; }
    .empty-icon { font-size: 3rem; margin-bottom: 8px; }
    .spinner {
      width: 36px; height: 36px; margin: 0 auto;
      border: 3px solid var(--border); border-top-color: var(--accent);
      border-radius: 50%; animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── FOOTER ── */
    footer {
      border-top: 1px solid var(--border);
      padding: 28px 32px; color: var(--sub);
      font-size: .78rem; text-align: center; line-height: 1.8;
    }
    .footer-logo {
      font-size: 1rem; font-weight: 800; margin-bottom: 6px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    footer a { color: var(--sub); }
    footer a:hover { color: var(--accent2); }

    /* ── RESPONSIVE ── */
    @media (max-width: 700px) {
      header { padding: 0 16px; }
      .hero { padding: 40px 16px 28px; }
      .hero h1 { font-size: 1.65rem; }
      .hero-stats { gap: 20px; }
      .cat-bar, .src-row, .toolbar, .list-wrap { padding-left: 16px; padding-right: 16px; }
      .row-title { max-width: 160px; }
      .search-wrap { width: 140px; }
      .row-org { display: none; }
    }
  </style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="h-inner">
    <div class="logo">venture</div>
    <div class="search-wrap">
      <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
        <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
      </svg>
      <input type="text" id="searchInput" placeholder="공모전 검색..." />
    </div>
  </div>
</header>

<!-- HERO -->
<section class="hero">
  <h1>지금 지원할 수 있는<br /><em>IT 공모전</em>을 한 눈에</h1>
  <p>링커리어 · 씽굿 · 위비티 · 공모전박람회 데이터를 매일 자동 수집합니다.</p>
  <div class="hero-stats">
    <div class="stat"><div class="stat-num" id="statTotal">—</div><div class="stat-label">전체 공모전</div></div>
    <div class="stat"><div class="stat-num" id="statClosing">—</div><div class="stat-label">D-7 이내 마감</div></div>
    <div class="stat"><div class="stat-num" id="statUpdated">—</div><div class="stat-label">최근 업데이트</div></div>
  </div>
</section>

<!-- CAT BAR -->
<div class="cat-bar" id="catBar"></div>

<!-- SOURCE ROW (hidden) -->
<div class="src-row" id="srcRow" style="display:none"></div>

<!-- TOOLBAR -->
<div class="toolbar">
  <p class="result-count">총 <strong id="resultCount">—</strong>개의 공모전</p>
  <div class="sort-group">
    <button class="sort-btn active" id="sortLatest" onclick="setSort('latest')">최신순</button>
    <button class="sort-btn" id="sortDeadline" onclick="setSort('deadline')">종료임박순</button>
  </div>
</div>

<!-- LIST -->
<div class="list-wrap" id="listWrap">
  <div class="loading"><div class="spinner"></div><p>공모전 정보를 불러오는 중...</p></div>
</div>

<!-- FOOTER -->
<footer>
  <div class="footer-logo">venture</div>
  <p>
    데이터 출처:
    <a href="https://linkareer.com/list/contest" target="_blank">링커리어</a> ·
    <a href="https://www.wevity.com" target="_blank">위비티</a> ·
    <a href="https://www.thinkgood.co.kr" target="_blank">씽굿</a> ·
    <a href="https://www.contestkorea.com" target="_blank">공모전박람회</a>
  </p>
  <p>매일 오전 9시 자동 업데이트 · 정보는 참고용이며 실제 공고를 반드시 확인하세요.</p>
</footer>

<script>
const CAT_ICONS = {
  "AI/머신러닝":"🤖","빅데이터":"📊","데이터":"🗃️","앱개발":"📱","웹개발":"🌐",
  "IoT/임베디드":"🔌","게임/VR":"🎮","보안/해킹":"🔒","블록체인":"⛓️",
  "UI/UX":"🎨","기타IT":"💻","전체":"🔍",
};
const SOURCES = ["linkareer","wevity","thinkgood","gonmofair","campuspick"];
const SRC_LABEL = {
  linkareer:"링커리어", wevity:"위비티",
  thinkgood:"씽굿", gonmofair:"공모전박람회", campuspick:"캠퍼스픽",
};

let allData = [];
let state  = { cat:"전체", sort:"latest", source:null, search:"" };

/* ── 초기화 ── */
document.addEventListener("DOMContentLoaded", () => {
  loadData();
  document.getElementById("searchInput").addEventListener("input", e => {
    state.search = e.target.value.trim();
    render();
  });
});

async function loadData() {
  try {
    const res  = await fetch("data.json?t=" + Date.now());
    const data = await res.json();
    allData = data.contests || [];

    // 통계
    document.getElementById("statTotal").textContent   = allData.length;
    document.getElementById("statUpdated").textContent = (data.updated || "").slice(0,10);
    const closing = allData.filter(c => c.days_left !== null && c.days_left >= 0 && c.days_left <= 7).length;
    document.getElementById("statClosing").textContent = closing;

    buildCatBar();
    buildSrcRow();
    render();
  } catch(e) {
    document.getElementById("listWrap").innerHTML =
      '<div class="empty"><div class="empty-icon">📭</div><p>데이터를 불러올 수 없습니다.<br>GitHub Actions가 아직 실행되지 않았을 수 있습니다.</p></div>';
  }
}

/* ── 카테고리 탭 생성 ── */
function buildCatBar() {
  const counts = { "전체": allData.length };
  allData.forEach(c => {
    const cat = c.category || "기타IT";
    counts[cat] = (counts[cat] || 0) + 1;
  });

  const order = ["전체","AI/머신러닝","빅데이터","데이터","앱개발","웹개발","보안/해킹","게임/VR","블록체인","IoT/임베디드","UI/UX","기타IT"];
  const cats  = [...order.filter(k => counts[k]), ...Object.keys(counts).filter(k => !order.includes(k))];

  document.getElementById("catBar").innerHTML = cats.map(cat => {
    const icon   = CAT_ICONS[cat] || "📌";
    const active = cat === state.cat ? "active" : "";
    return `<button class="cat-btn ${active}" data-cat="${esc(cat)}" onclick="selectCat(this)">
      ${icon} ${esc(cat)} <span class="cnt">${counts[cat]}</span>
    </button>`;
  }).join("");
}

/* ── 출처 행 생성 ── */
function buildSrcRow() {
  const present = [...new Set(allData.map(c => c.source_site).filter(Boolean))];
  const row = document.getElementById("srcRow");
  row.innerHTML = present.map(s => `
    <button class="src-chip" data-src="${esc(s)}" onclick="selectSrc(this)">${esc(SRC_LABEL[s]||s)}</button>
  `).join("");
}

/* ── 렌더 ── */
function render() {
  const q = state.search.toLowerCase();

  let items = allData.filter(c => {
    const matchCat = state.cat === "전체" || (c.category || "기타IT") === state.cat;
    const matchSrc = !state.source || c.source_site === state.source;
    const matchQ   = !q || c.title.toLowerCase().includes(q) || (c.organization||"").toLowerCase().includes(q);
    return matchCat && matchSrc && matchQ;
  });

  if (state.sort === "deadline") {
    items = [...items].sort((a, b) => {
      if (a.days_left === null || a.days_left === undefined) return 1;
      if (b.days_left === null || b.days_left === undefined) return -1;
      if (a.days_left < 0 && b.days_left >= 0) return 1;
      if (b.days_left < 0 && a.days_left >= 0) return -1;
      return a.days_left - b.days_left;
    });
  }

  document.getElementById("resultCount").textContent = items.length;
  const wrap = document.getElementById("listWrap");

  if (!items.length) {
    wrap.innerHTML = '<div class="empty"><div class="empty-icon">🔍</div><p>조건에 맞는 공모전이 없습니다.</p></div>';
    return;
  }

  wrap.innerHTML = items.map(c => {
    const icon     = CAT_ICONS[c.category || "기타IT"] || "💻";
    const srcKey   = c.source_site || "linkareer";
    const srcLabel = c.source_label || SRC_LABEL[srcKey] || srcKey;
    const expired  = c.days_left !== null && c.days_left < 0;
    const dday     = getDday(c.days_left);
    const deadline = c.deadline ? `${c.deadline.slice(5).replace(".","/") } 마감` : "마감일 미정";
    const thumbHtml = c.thumbnail
      ? `<img src="${esc(c.thumbnail)}" alt="" onerror="this.style.display='none'">`
      : icon;

    return `<a class="row-card${expired?" expired":""}"
         href="${esc(c.url||"#")}" target="_blank" rel="noopener noreferrer">
      <div class="row-icon">${thumbHtml}</div>
      <div class="row-main">
        <div class="row-top">
          <span class="row-title">${esc(c.title)}</span>
          <span class="row-cat">${esc(c.category||"기타IT")}</span>
        </div>
        <div class="row-org">${c.organization ? "🏢 "+esc(c.organization) : ""}</div>
      </div>
      <div class="row-meta">
        <span class="src-badge badge-${esc(srcKey)}">${esc(srcLabel)}</span>
        <div class="deadline-wrap">
          <div class="deadline-date">${esc(deadline)}</div>
          <div class="dday ${dday.cls}">${dday.text}</div>
        </div>
      </div>
    </a>`;
  }).join("");
}

/* ── D-day ── */
function getDday(d) {
  if (d === null || d === undefined) return { text:"미정",       cls:"dday-gray"   };
  if (d < 0)   return { text:"마감",        cls:"dday-gray"   };
  if (d === 0) return { text:"오늘 마감!",  cls:"dday-red"    };
  if (d <= 3)  return { text:`D-${d}`,      cls:"dday-red"    };
  if (d <= 7)  return { text:`D-${d}`,      cls:"dday-yellow" };
  return         { text:`D-${d}`,            cls:"dday-green"  };
}

/* ── 컨트롤 ── */
function selectCat(btn) {
  state.cat = btn.dataset.cat;
  document.querySelectorAll(".cat-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  render();
}
function selectSrc(btn) {
  const id = btn.dataset.src;
  state.source = state.source === id ? null : id;
  document.querySelectorAll(".src-chip").forEach(b => b.classList.toggle("active", b.dataset.src === state.source));
  render();
}
function setSort(sort) {
  state.sort = sort;
  document.getElementById("sortLatest").classList.toggle("active",   sort === "latest");
  document.getElementById("sortDeadline").classList.toggle("active", sort === "deadline");
  render();
}
function esc(s) {
  return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
</script>
</body>
</html>
