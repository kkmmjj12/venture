<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Venture — 공모전 알리미</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2a2d3a;
      --accent: #6c63ff;
      --accent2: #00d4aa;
      --text: #e8eaf0;
      --muted: #8b8fa8;
      --cs: #6c63ff;
      --other: #3a3d4a;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }

    header {
      border-bottom: 1px solid var(--border);
      padding: 24px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }
    .logo { display: flex; align-items: center; gap: 12px; }
    .logo-icon { font-size: 28px; }
    .logo h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
    .logo p { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .updated { font-size: 12px; color: var(--muted); }

    .stats {
      display: flex;
      gap: 16px;
      padding: 20px 32px;
      flex-wrap: wrap;
    }
    .stat {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 20px;
      min-width: 120px;
    }
    .stat .num { font-size: 26px; font-weight: 700; color: var(--accent2); }
    .stat .label { font-size: 12px; color: var(--muted); margin-top: 2px; }

    .controls {
      padding: 0 32px 16px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }
    .filter-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 7px 16px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 13px;
      transition: all .15s;
    }
    .filter-btn.active, .filter-btn:hover {
      border-color: var(--accent);
      color: var(--text);
      background: rgba(108,99,255,.15);
    }
    .sort-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 6px 13px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 12px;
      transition: all .15s;
    }
    .sort-btn.active {
      border-color: var(--accent2);
      color: var(--accent2);
      background: rgba(0,212,170,.1);
    }
    #search {
      margin-left: auto;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 7px 14px;
      border-radius: 20px;
      font-size: 13px;
      outline: none;
      width: 200px;
      transition: border-color .15s;
    }
    #search:focus { border-color: var(--accent); }
    #search::placeholder { color: var(--muted); }
    .dday { font-weight: 700; }
    .dday-red { color: #ff6b6b; }
    .dday-orange { color: #ffa94d; }
    .dday-yellow { color: #ffe066; }
    .dday-green { color: #69db7c; }
    .source-linkareer { color: #4dabf7; }
    .source-wevity { color: #69db7c; }
    .source-thinkgood { color: #ffa94d; }
    .source-campuspick { color: #da77f2; }
    .source-gonmofair { color: #ff8787; }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
      padding: 0 32px 40px;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px;
      transition: border-color .15s, transform .15s;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .card:hover { border-color: var(--accent); transform: translateY(-2px); }
    .card.cs { border-left: 3px solid var(--cs); }

    .card-top { display: flex; align-items: flex-start; gap: 10px; }
    .badge {
      font-size: 18px;
      flex-shrink: 0;
      margin-top: 1px;
    }
    .card-title { font-size: 14px; font-weight: 600; line-height: 1.4; }

    .card-meta { display: flex; flex-wrap: wrap; gap: 6px; font-size: 12px; color: var(--muted); }
    .tag {
      background: var(--border);
      border-radius: 6px;
      padding: 3px 8px;
    }
    .tag.cs-tag { background: rgba(108,99,255,.2); color: #a09cf7; }
    .deadline { color: #ff6b6b; }

    .card-link {
      margin-top: auto;
      display: inline-block;
      color: var(--accent2);
      font-size: 12px;
      text-decoration: none;
    }
    .card-link:hover { text-decoration: underline; }

    .empty { text-align: center; padding: 80px 32px; color: var(--muted); grid-column: 1/-1; }
    .empty p { font-size: 15px; margin-top: 8px; }

    footer {
      text-align: center;
      padding: 24px;
      color: var(--muted);
      font-size: 12px;
      border-top: 1px solid var(--border);
    }
    footer a { color: var(--accent); text-decoration: none; }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <span class="logo-icon">🚀</span>
    <div>
      <h1>Venture</h1>
    </div>
  </div>
  <span class="updated" id="updated">업데이트 중...</span>
</header>

<div class="stats">
  <div class="stat"><div class="num" id="total-count">-</div><div class="label">전체 공모전</div></div>
  <div class="stat"><div class="num" id="closing-count">-</div><div class="label">⏰ 마감 임박</div></div>
</div>

<div class="controls" id="cat-controls">
  <button class="filter-btn active" data-cat="전체">전체</button>
  <button class="filter-btn" data-cat="AI/머신러닝">🤖 AI</button>
  <button class="filter-btn" data-cat="빅데이터">📊 빅데이터</button>
  <button class="filter-btn" data-cat="데이터">🗃️ 데이터</button>
  <button class="filter-btn" data-cat="앱개발">📱 앱개발</button>
  <button class="filter-btn" data-cat="웹개발">🌐 웹개발</button>
  <button class="filter-btn" data-cat="보안/해킹">🔒 보안</button>
  <button class="filter-btn" data-cat="게임/VR">🎮 게임</button>
  <button class="filter-btn" data-cat="블록체인">⛓️ 블록체인</button>
  <button class="filter-btn" data-cat="기타IT">💻 기타IT</button>
</div>

<div class="controls">
  <button class="sort-btn active" data-sort="latest" onclick="setSort('latest')">최신순</button>
  <button class="sort-btn" data-sort="deadline" onclick="setSort('deadline')">마감임박순</button>
  <div style="margin-left:8px;display:flex;gap:6px;">
    <button class="filter-btn" id="src-linkareer" data-src="linkareer" onclick="toggleSource('linkareer')" style="font-size:11px;padding:5px 11px;color:#4dabf7;border-color:#4dabf7;">링커리어</button>
    <button class="filter-btn" id="src-wevity" data-src="wevity" onclick="toggleSource('wevity')" style="font-size:11px;padding:5px 11px;color:#69db7c;border-color:#69db7c;">위비티</button>
    <button class="filter-btn" id="src-thinkgood" data-src="thinkgood" onclick="toggleSource('thinkgood')" style="font-size:11px;padding:5px 11px;color:#ffa94d;border-color:#ffa94d;">씽굿</button>
    <button class="filter-btn" id="src-campuspick" data-src="campuspick" onclick="toggleSource('campuspick')" style="font-size:11px;padding:5px 11px;color:#da77f2;border-color:#da77f2;">캠퍼스픽</button>
    <button class="filter-btn" id="src-gonmofair" data-src="gonmofair" onclick="toggleSource('gonmofair')" style="font-size:11px;padding:5px 11px;color:#ff8787;border-color:#ff8787;">공모전박람회</button>
  </div>
  <input id="search" type="text" placeholder="🔍 공모전 검색..." />
</div>

<div class="grid" id="grid"></div>

<footer>
  Venture · <a href="https://github.com/kkmmjj12/venture" target="_blank">GitHub</a> ·
  매일 오전 9시 자동 업데이트
</footer>

<script>
const SOURCE_CLASS = { linkareer:"source-linkareer", wevity:"source-wevity", thinkgood:"source-thinkgood", campuspick:"source-campuspick", gonmofair:"source-gonmofair" };
const CAT_ICON = {
  "AI/머신러닝":"🤖","빅데이터":"📊","데이터":"🗃️","앱개발":"📱","웹개발":"🌐",
  "IoT/임베디드":"🔌","게임/VR":"🎮","보안/해킹":"🔒","블록체인":"⛓️","UI/UX":"🎨","기타IT":"💻"
};

let allData = [];
let state = { cat: "전체", sort: "deadline", source: null, search: "" };

document.addEventListener("DOMContentLoaded", () => {
  load();
  document.getElementById("search").addEventListener("input", e => { state.search = e.target.value; render(); });
  document.querySelectorAll("[data-cat]").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll("[data-cat]").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      state.cat = btn.dataset.cat;
      render();
    });
  });
});

async function load() {
  const grid = document.getElementById("grid");
  grid.innerHTML = '<div class="empty"><div class="spinner"></div><p>불러오는 중...</p></div>';
  try {
    const res = await fetch("data.json?t=" + Date.now());
    const data = await res.json();
    allData = data.contests || [];
    document.getElementById("updated").textContent = "업데이트: " + (data.updated || "-");
    document.getElementById("total-count").textContent = allData.length;
    const closing = allData.filter(c => c.days_left !== null && c.days_left >= 0 && c.days_left <= 7).length;
    document.getElementById("closing-count").textContent = closing;
    render();
  } catch(e) {
    grid.innerHTML = '<div class="empty"><div style="font-size:40px">📭</div><p>데이터를 불러올 수 없습니다.<br>GitHub Actions가 아직 실행되지 않았을 수 있습니다.</p></div>';
  }
}

function render() {
  const q = state.search.toLowerCase();
  let items = allData.filter(c => {
    const matchCat = state.cat === "전체" || c.category === state.cat;
    const matchSrc = !state.source || c.source_site === state.source;
    const matchQ = !q || c.title.toLowerCase().includes(q) || (c.organization||"").toLowerCase().includes(q);
    return matchCat && matchSrc && matchQ;
  });

  if (state.sort === "deadline") {
    items = [...items].sort((a, b) => {
      if (a.days_left === null) return 1;
      if (b.days_left === null) return -1;
      return a.days_left - b.days_left;
    });
  }

  document.getElementById("updated").textContent = `총 ${items.length}개`;

  const grid = document.getElementById("grid");
  if (!items.length) {
    grid.innerHTML = '<div class="empty"><div style="font-size:40px">🔍</div><p>검색 결과가 없습니다.</p></div>';
    return;
  }
  grid.innerHTML = items.map(c => {
    const icon = CAT_ICON[c.category] || "💻";
    const srcClass = SOURCE_CLASS[c.source_site] || "";
    const srcLabel = c.source_label || c.source_site;
    const dday = getDday(c.days_left);
    return `
    <div class="card cs">
      <div class="card-top">
        <span class="badge">${icon}</span>
        <span class="card-title">${esc(c.title)}</span>
      </div>
      <div class="card-meta">
        <span class="tag cs-tag">${esc(c.category || "기타IT")}</span>
        ${c.organization ? `<span class="tag">${esc(c.organization)}</span>` : ""}
        ${dday}
        <span class="tag ${srcClass}" style="margin-left:auto">${srcLabel}</span>
      </div>
      ${c.url ? `<a class="card-link" href="${esc(c.url)}" target="_blank" rel="noopener">바로가기 →</a>` : ""}
    </div>`;
  }).join("");
}

function getDday(days) {
  if (days === null || days === undefined) return "";
  if (days < 0) return `<span class="tag" style="color:#888">종료</span>`;
  if (days === 0) return `<span class="tag dday dday-red">오늘마감!</span>`;
  if (days <= 3)  return `<span class="tag dday dday-red">D-${days}</span>`;
  if (days <= 7)  return `<span class="tag dday dday-orange">D-${days}</span>`;
  if (days <= 14) return `<span class="tag dday dday-yellow">D-${days}</span>`;
  return `<span class="tag dday dday-green">D-${days}</span>`;
}

function setSort(sort) {
  state.sort = sort;
  document.querySelectorAll(".sort-btn").forEach(b => b.classList.toggle("active", b.dataset.sort === sort));
  render();
}

function toggleSource(src) {
  state.source = state.source === src ? null : src;
  ["linkareer","wevity","thinkgood","campuspick","gonmofair"].forEach(s => {
    document.getElementById("src-" + s)?.classList.toggle("active", state.source === s);
  });
  render();
}

function esc(s) {
  return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
</script>
</body>
</html>
